<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1f33;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="omcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orb left -->
  <ellipse cx="150" cy="315" rx="200" ry="200" fill="#7c3aed" opacity="0.08"/>
  <!-- Glow orb right -->
  <ellipse cx="1050" cy="315" rx="200" ry="200" fill="#2563eb" opacity="0.08"/>
  <!-- Glow orb center top -->
  <ellipse cx="600" cy="100" rx="300" ry="150" fill="#6366f1" opacity="0.06"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)"/>

  <!-- ===== LEFT PANEL - Terminal ===== -->
  <rect x="60" y="100" width="460" height="430" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
  <!-- Terminal header -->
  <rect x="60" y="100" width="460" height="42" rx="12" fill="#21262d"/>
  <rect x="60" y="130" width="460" height="12" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="92" cy="121" r="6" fill="#ff5f57"/>
  <circle cx="114" cy="121" r="6" fill="#febc2e"/>
  <circle cx="136" cy="121" r="6" fill="#28c840"/>
  <!-- Terminal title -->
  <text x="270" y="126" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">oh-my-claudecode</text>

  <!-- Terminal content -->
  <text x="88" y="172" font-family="monospace" font-size="13" fill="#8b949e">$ </text>
  <text x="104" y="172" font-family="monospace" font-size="13" fill="#58a6ff">/plugin install oh-my-claudecode</text>

  <text x="88" y="198" font-family="monospace" font-size="12" fill="#3fb950">✓ Plugin installed successfully</text>

  <text x="88" y="228" font-family="monospace" font-size="13" fill="#8b949e">$ </text>
  <text x="104" y="228" font-family="monospace" font-size="13" fill="#58a6ff">/omc-setup</text>

  <text x="88" y="254" font-family="monospace" font-size="12" fill="#3fb950">✓ OMC initialized (32 agents ready)</text>

  <text x="88" y="284" font-family="monospace" font-size="13" fill="#8b949e">$ </text>
  <text x="104" y="284" font-family="monospace" font-size="13" fill="#e6edf3">autopilot: </text>
  <text x="192" y="284" font-family="monospace" font-size="13" fill="#a5d6ff">결제 모듈 구현해줘</text>

  <!-- Pipeline visualization -->
  <rect x="88" y="304" width="400" height="1" fill="#30363d"/>

  <text x="88" y="328" font-family="monospace" font-size="11" fill="#8b949e">[OMC Autopilot] 7-stage pipeline</text>

  <!-- Stage dots -->
  <circle cx="96" cy="355" r="5" fill="#3fb950" filter="url(#glow)"/>
  <text x="108" y="359" font-family="monospace" font-size="11" fill="#3fb950">analyst</text>
  <line x1="152" y1="355" x2="170" y2="355" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="3,2"/>

  <circle cx="178" cy="355" r="5" fill="#3fb950" filter="url(#glow)"/>
  <text x="190" y="359" font-family="monospace" font-size="11" fill="#3fb950">architect</text>

  <line x1="244" y1="355" x2="262" y2="355" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="270" cy="355" r="5" fill="#58a6ff" filter="url(#glow)"/>
  <text x="282" y="359" font-family="monospace" font-size="11" fill="#58a6ff">planner</text>

  <line x1="330" y1="355" x2="348" y2="355" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="356" cy="355" r="5" fill="#f0883e" filter="url(#glow)"/>
  <text x="368" y="359" font-family="monospace" font-size="11" fill="#f0883e">executor</text>

  <!-- Stage 2 -->
  <circle cx="96" cy="387" r="5" fill="#8b949e"/>
  <text x="108" y="391" font-family="monospace" font-size="11" fill="#8b949e">tester</text>
  <line x1="148" y1="387" x2="166" y2="387" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>

  <circle cx="174" cy="387" r="5" fill="#8b949e"/>
  <text x="186" y="391" font-family="monospace" font-size="11" fill="#8b949e">verifier</text>

  <line x1="238" y1="387" x2="256" y2="387" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="264" cy="387" r="5" fill="#8b949e"/>
  <text x="276" y="391" font-family="monospace" font-size="11" fill="#8b949e">reviewer</text>

  <!-- Current status -->
  <rect x="88" y="412" width="400" height="1" fill="#30363d"/>
  <text x="88" y="436" font-family="monospace" font-size="11" fill="#8b949e">[OMC] </text>
  <text x="130" y="436" font-family="monospace" font-size="11" fill="#f0883e">executor </text>
  <text x="190" y="436" font-family="monospace" font-size="11" fill="#8b949e">running... </text>
  <text x="270" y="436" font-family="monospace" font-size="11" fill="#3fb950">Cost: $0.08</text>

  <!-- Blinking cursor -->
  <rect x="88" y="458" width="8" height="16" fill="#58a6ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Parallel workers bar -->
  <text x="88" y="498" font-family="monospace" font-size="11" fill="#8b949e">Workers: </text>
  <rect x="164" y="488" width="16" height="14" rx="3" fill="#3fb950" opacity="0.8"/>
  <rect x="184" y="488" width="16" height="14" rx="3" fill="#3fb950" opacity="0.8"/>
  <rect x="204" y="488" width="16" height="14" rx="3" fill="#f0883e" opacity="0.8"/>
  <rect x="224" y="488" width="16" height="14" rx="3" fill="#8b949e" opacity="0.4"/>
  <rect x="244" y="488" width="16" height="14" rx="3" fill="#8b949e" opacity="0.4"/>
  <text x="270" y="499" font-family="monospace" font-size="11" fill="#8b949e">3/5 active</text>

  <!-- ===== CENTER - Main Title ===== -->
  <!-- OMC Badge -->
  <rect x="490" y="100" width="220" height="44" rx="22" fill="url(#accentGrad)" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
  <text x="600" y="128" font-family="monospace" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="bold">✦ Plugin for Claude Code</text>

  <!-- Main title -->
  <text x="600" y="210" font-family="'Arial Black', sans-serif" font-size="52" fill="url(#omcGrad)" text-anchor="middle" font-weight="900" filter="url(#softGlow)">Oh My</text>
  <text x="600" y="272" font-family="'Arial Black', sans-serif" font-size="52" fill="url(#omcGrad)" text-anchor="middle" font-weight="900" filter="url(#softGlow)">Claude Code</text>

  <!-- OMC abbreviation -->
  <text x="600" y="320" font-family="monospace" font-size="22" fill="#6e7681" text-anchor="middle">— OMC —</text>

  <!-- Divider -->
  <rect x="490" y="340" width="220" height="1" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Feature pills -->
  <rect x="493" y="360" width="100" height="28" rx="14" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <text x="543" y="379" font-family="sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">32 Agents</text>

  <rect x="603" y="360" width="104" height="28" rx="14" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <text x="655" y="379" font-family="sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">Multi-Model</text>

  <rect x="493" y="398" width="120" height="28" rx="14" fill="#059669" opacity="0.2" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <text x="553" y="417" font-family="sans-serif" font-size="12" fill="#34d399" text-anchor="middle">Autopilot</text>

  <rect x="623" y="398" width="84" height="28" rx="14" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="1" opacity="0.5"/>
  <text x="665" y="417" font-family="sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">Ultrapilot</text>

  <rect x="493" y="436" width="76" height="28" rx="14" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <text x="531" y="455" font-family="sans-serif" font-size="12" fill="#f87171" text-anchor="middle">Ralph</text>

  <rect x="579" y="436" width="68" height="28" rx="14" fill="#0891b2" opacity="0.2" stroke="#0891b2" stroke-width="1" opacity="0.5"/>
  <text x="613" y="455" font-family="sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Swarm</text>

  <rect x="657" y="436" width="50" height="28" rx="14" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <text x="682" y="455" font-family="sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">CCG</text>

  <!-- Token saving badge -->
  <rect x="493" y="490" width="214" height="40" rx="8" fill="#0d2a1a" stroke="#3fb950" stroke-width="1"/>
  <text x="600" y="506" font-family="sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">Smart Model Routing</text>
  <text x="600" y="522" font-family="sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="bold">토큰 비용 30~50% 절감</text>

  <!-- ===== RIGHT PANEL - Mode Cards ===== -->
  <!-- Mode cards -->
  <!-- Autopilot card -->
  <rect x="730" y="100" width="410" height="90" rx="10" fill="#0d1f33" stroke="#2563eb" stroke-width="1"/>
  <rect x="730" y="100" width="4" height="90" rx="2" fill="#2563eb"/>
  <text x="750" y="130" font-family="monospace" font-size="14" fill="#60a5fa" font-weight="bold">/autopilot</text>
  <text x="750" y="152" font-family="sans-serif" font-size="12" fill="#8b949e">개념 → 완성 7단계 완전 자율 실행</text>
  <text x="750" y="172" font-family="monospace" font-size="11" fill="#6e7681">analysis → design → plan → exec → test → verify</text>

  <!-- Ralph card -->
  <rect x="730" y="202" width="410" height="80" rx="10" fill="#1a0d0d" stroke="#dc2626" stroke-width="1"/>
  <rect x="730" y="202" width="4" height="80" rx="2" fill="#dc2626"/>
  <text x="750" y="230" font-family="monospace" font-size="14" fill="#f87171" font-weight="bold">/ralph</text>
  <text x="750" y="252" font-family="sans-serif" font-size="12" fill="#8b949e">검증 완료까지 멈추지 않는 반복 실행</text>
  <text x="750" y="270" font-family="monospace" font-size="11" fill="#6e7681">fix → test → verify → repeat until done</text>

  <!-- Ultrapilot card -->
  <rect x="730" y="294" width="410" height="80" rx="10" fill="#1a1500" stroke="#d97706" stroke-width="1"/>
  <rect x="730" y="294" width="4" height="80" rx="2" fill="#d97706"/>
  <text x="750" y="322" font-family="monospace" font-size="14" fill="#fbbf24" font-weight="bold">/ultrapilot</text>
  <text x="750" y="344" font-family="sans-serif" font-size="12" fill="#8b949e">최대 5개 병렬 워커 — 3~5배 빠른 완성</text>
  <text x="750" y="362" font-family="monospace" font-size="11" fill="#6e7681">worker×5 parallel execution</text>

  <!-- CCG card -->
  <rect x="730" y="386" width="410" height="80" rx="10" fill="#0d1a1a" stroke="#0891b2" stroke-width="1"/>
  <rect x="730" y="386" width="4" height="80" rx="2" fill="#0891b2"/>
  <text x="750" y="414" font-family="monospace" font-size="14" fill="#22d3ee" font-weight="bold">/ccg</text>
  <text x="750" y="436" font-family="sans-serif" font-size="12" fill="#8b949e">Claude + Codex + Gemini 삼중 합성</text>
  <text x="750" y="454" font-family="monospace" font-size="11" fill="#6e7681">tri-model synthesis response</text>

  <!-- Stats row -->
  <rect x="730" y="480" width="195" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="827" y="502" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Specialized Agents</text>
  <text x="827" y="522" font-family="'Arial Black', sans-serif" font-size="20" fill="#a78bfa" text-anchor="middle" font-weight="900">32</text>

  <rect x="945" y="480" width="195" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="1042" y="502" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Automation Skills</text>
  <text x="1042" y="522" font-family="'Arial Black', sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle" font-weight="900">40+</text>

  <!-- Bottom bar -->
  <rect x="0" y="598" width="1200" height="32" fill="#0d1117"/>
  <rect x="0" y="598" width="1200" height="1" fill="#30363d"/>
  <text x="60" y="619" font-family="monospace" font-size="12" fill="#6e7681">github.com/Yeachan-Heo/oh-my-claudecode</text>
  <text x="1140" y="619" font-family="monospace" font-size="12" fill="#6e7681" text-anchor="end">ohmyclaudecode.com</text>
</svg>
